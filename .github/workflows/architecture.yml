name: architecture-manifest

on:
  push:
  pull_request:

jobs:
  check-architecture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify Rocq/OCaml architecture mapping
        run: python3 scripts/check_architecture_manifest.py
      - name: Verify layer dependency rules
        run: python3 scripts/check_layer_dependencies.py
      - name: Verify Rocq axiom guard
        run: python3 scripts/check_rocq_axiom_guard.py
      - name: Verify Why backend guardrail
        run: python3 scripts/check_why_backend_guardrail.py
